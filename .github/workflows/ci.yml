name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_PROJECT_ID: ci-project-id
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build:packages

      - name: Test packages
        run: npm run test:packages

      - name: Type check
        run: npm run type-check

      - name: Build app
        run: npm run build
